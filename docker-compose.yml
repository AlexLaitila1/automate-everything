services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
